$mainMod = SUPER
$terminal = kitty
$fileManager = kitty -e yazi

# General
bind = $mainMod, SPACE,            exec, uwsm app -- quickshell --path @HOME@/.config/quickshell/launcher.qml
bind = $mainMod, R,                exec, $terminal
bind = $mainMod, RETURN,           exec, $terminal --class floatingterm
bind = $mainMod, Q,                killactive
bind = ALT, F4,                    killactive
bind = $mainMod, F11,              fullscreen
bind = $mainMod, F,                exec, librewolf
bind = $mainMod SHIFT, F,          exec, librewolf --private-window
bind = $mainMod, W,                exec, $fileManager
bind = $mainMod, S,                exec, hyprctl --batch 'dispatch togglefloating; dispatch centerwindow 1'
bind = $mainMod, P,                pseudo
bind = $mainMod, J,                togglesplit
bind = $mainMod, D,                pin
bind = $mainMod, semicolon,        togglespecialworkspace
bind = $mainMod SHIFT, semicolon,  movetoworkspace, special
bind = , PRINT,                    exec, grimblast copysave area
bind = $mainMod, PRINT,            exec, grimblast copysave screen

# Split control
bind = $mainMod, V,           layoutmsg, swapsplit
bind = $mainMod CTRL, N,      layoutmsg, preselect l
bind = $mainMod CTRL, O,      layoutmsg, preselect r
bind = $mainMod CTRL, I,      layoutmsg, preselect d
bind = $mainMod CTRL, E,      layoutmsg, preselect u

# Window groups
bind = $mainMod, G,           togglegroup
bind = $mainMod ALT, G,       lockactivegroup
bind = $mainMod, Tab,         changegroupactive, f
bind = $mainMod SHIFT, Tab,   changegroupactive, b

# Window movement (arrows + Colemak)
bind = $mainMod CTRL, left,   movewindow, l
bind = $mainMod CTRL, N,      movewindow, l
bind = $mainMod CTRL, right,  movewindow, r
bind = $mainMod CTRL, O,      movewindow, r
bind = $mainMod CTRL, up,     movewindow, u
bind = $mainMod CTRL, E,      movewindow, u
bind = $mainMod CTRL, down,   movewindow, d
bind = $mainMod CTRL, I,      movewindow, d

# Focus (arrows + Colemak)
bind = $mainMod, left,        movefocus, l
bind = $mainMod, N,           movefocus, l
bind = $mainMod, right,       movefocus, r
bind = $mainMod, O,           movefocus, r
bind = $mainMod, up,          movefocus, u
bind = $mainMod, E,           movefocus, u
bind = $mainMod, down,        movefocus, d
bind = $mainMod, I,           movefocus, d
bind = ALT, Tab,              cyclenext
bind = $mainMod, Tab,         swapnext

# Workspaces
bind = $mainMod, 1,  workspace, 1
bind = $mainMod, 2,  workspace, 2
bind = $mainMod, 3,  workspace, 3
bind = $mainMod, 4,  workspace, 4
bind = $mainMod, 5,  workspace, 5
bind = $mainMod, 6,  workspace, 6
bind = $mainMod, 7,  workspace, 7
bind = $mainMod, 8,  workspace, 8
bind = $mainMod, 9,  workspace, 9
bind = $mainMod, 0,  workspace, 10

bind = $mainMod SHIFT, 1,  movetoworkspace, 1
bind = $mainMod SHIFT, 2,  movetoworkspace, 2
bind = $mainMod SHIFT, 3,  movetoworkspace, 3
bind = $mainMod SHIFT, 4,  movetoworkspace, 4
bind = $mainMod SHIFT, 5,  movetoworkspace, 5
bind = $mainMod SHIFT, 6,  movetoworkspace, 6
bind = $mainMod SHIFT, 7,  movetoworkspace, 7
bind = $mainMod SHIFT, 8,  movetoworkspace, 8
bind = $mainMod SHIFT, 9,  movetoworkspace, 9
bind = $mainMod SHIFT, 0,  movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down,  workspace, e+1
bind = $mainMod, mouse_up,    workspace, e-1

bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

binde = $mainMod SHIFT, N,  resizeactive, -20 0
binde = $mainMod SHIFT, O,  resizeactive,  20 0
binde = $mainMod SHIFT, I,  resizeactive,  0 -20
binde = $mainMod SHIFT, E,  resizeactive,  0  20

bindl = , XF86AudioRaiseVolume,    exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume,    exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,           exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86MonBrightnessUp,     exec, brightnessctl set 5%+
bindl = , XF86MonBrightnessDown,   exec, brightnessctl set 5%-
