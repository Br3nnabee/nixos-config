# Monitor
# Format: name, resolution@hz, position, scale
monitor = DP-3,1920x1080@165,1920x0,1
monitor = DP-2,1920x1080@165,1920x0,1
monitor = DP-1,1920x1080@165,1920x0,1

# Input
input {
    sensitivity = 0.5
}

# Layout
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    # Rose Pine Gold and Pine accents
    col.active_border = rgba(f6c177ee) rgba(31748fee) 45deg
    col.inactive_border = rgba(1f1d2eaa)
    layout = dwindle
    allow_tearing = true
}

# Decorations
decoration {
    rounding = 12
    shadow {
        enabled = true
        range = 20
        render_power = 3
    }
    blur {
        enabled = true
        size = 2
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}

# Animations
animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazy, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnose, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, hyprnose, slide
    animation = windowsIn, 1, 7, hyprnose, slide
    animation = windowsOut, 1, 7, hyprnose, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 50, linear, loop
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Window rules
windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true
windowrule = float on, size 720 400, center on, match:class ^floatingterm$
windowrule = float 1, match:modal 1
windowrule = match:float 1
windowrule = immediate on, match:fullscreen 1
